site_name: M-Eyes
site_description: Open-source DDI platform (DNS, DHCP, IPAM) with Fortinet ecosystem integration
repo_url: https://github.com/FreddyMcFett/M-Eyes
theme:
  name: material
  logo: img/logo.svg
  favicon: img/favicon.png
  palette:
    primary: teal
    accent: green
  features:
    - navigation.sections
    - content.code.copy
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Screenshots: screenshots.md
  - Feature Reference: features.md
  - Architecture: architecture.md
  - Infoblox-style Features: infoblox-features.md
  - Fortinet Integration: fortinet-integration.md
  - Enterprise:
    - SAML Single Sign-On: saml-sso.md
    - Asset Management: asset-management.md
    - Integrations (Fortinet & Microsoft): integrations.md
    - Automation & Autonomy: automation.md
  - Versioning & Auditing: versioning.md
  - Upgrading & Backup: upgrade.md
  - API Reference: api/reference.md
markdown_extensions:
  - admonition
  - pymdownx.superfences
  - tables
