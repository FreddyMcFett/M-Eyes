name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      # Set by semantic-release (via the exec plugin) only when a new version is
      # actually published; empty otherwise so the publish job is skipped.
      version: ${{ steps.semantic.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install release tooling
        run: npm ci
      - name: Semantic release
        id: semantic
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

  # Publish the GHCR images for the release we just cut. Done here (rather than
  # from a tag-push trigger) because a tag pushed by GITHUB_TOKEN does not start
  # other workflows, which is why earlier releases never published images.
  publish-images:
    needs: release
    if: ${{ needs.release.outputs.version != '' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
    secrets: inherit
