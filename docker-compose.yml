name: m-eyes

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: meyes
      POSTGRES_PASSWORD: meyes
      POSTGRES_DB: meyes
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meyes"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    # Published images make upgrades a `docker compose pull && up -d`;
    # `docker compose build` still works for source installs.
    image: ghcr.io/freddymcfett/m-eyes-api:${MEYES_VERSION:-latest}
    build:
      context: .
      dockerfile: deploy/api/Dockerfile
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    environment:
      MEYES_DATABASE_URL: postgresql+psycopg://meyes:meyes@postgres:5432/meyes
      MEYES_JWT_SECRET: ${MEYES_JWT_SECRET:-meyes-dev-secret-change-me-in-production!}
      MEYES_BIND_OUTPUT_DIR: /shared/bind
      MEYES_KEA_OUTPUT_DIR: /shared/kea
      MEYES_RNDC_HOST: bind9
      MEYES_RNDC_KEY_FILE: /shared/bind/rndc.key
      MEYES_KEA_CA_URL: http://kea-ctrl-agent:8000
      MEYES_TLS_DIR: /shared/tls
      MEYES_TLS_DEFAULT_HOSTNAME: ${MEYES_HOSTNAME:-m-eyes.local}
      MEYES_SEED_DEMO: ${MEYES_SEED_DEMO:-true}
    volumes:
      - bind-config:/shared/bind
      - kea-config:/shared/kea
      - tls-config:/shared/tls
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    image: ghcr.io/freddymcfett/m-eyes-frontend:${MEYES_VERSION:-latest}
    build:
      context: .
      dockerfile: deploy/frontend/Dockerfile
    restart: unless-stopped
    environment:
      MEYES_TLS_DIR: /shared/tls
      MEYES_BOOTSTRAP_CN: ${MEYES_HOSTNAME:-m-eyes.local}
    volumes:
      - tls-config:/shared/tls
    depends_on:
      - api
    ports:
      - "8080:80"    # HTTP (redirects to HTTPS unless disabled in settings)
      - "8443:443"   # HTTPS

  bind9:
    image: internetsystemsconsortium/bind9:9.18
    restart: unless-stopped
    volumes:
      - ./deploy/bind9/named.conf:/etc/bind/named.conf:ro
      - ./deploy/bind9/named.conf.options:/etc/bind/named.conf.options:ro
      - bind-config:/etc/bind/m-eyes
    depends_on:
      # the api entrypoint creates zones.conf and the rndc key on first boot
      api:
        condition: service_healthy
    ports:
      - "5353:53/udp"
      - "5353:53/tcp"

  kea:
    image: jonasal/kea-dhcp4:2.6
    restart: unless-stopped
    command: -c /kea-config/kea-dhcp4.conf
    volumes:
      - kea-config:/kea-config
      - kea-sockets:/run/kea
    depends_on:
      # the api entrypoint installs the bootstrap config on first boot
      api:
        condition: service_healthy
    # Real DHCP service needs L2 access; uncomment for production use:
    # network_mode: host
    ports:
      - "6767:67/udp"

  kea-ctrl-agent:
    image: jonasal/kea-ctrl-agent:2.6
    restart: unless-stopped
    command: -c /kea/config/kea-ctrl-agent.conf
    volumes:
      - ./deploy/kea/kea-ctrl-agent.conf:/kea/config/kea-ctrl-agent.conf:ro
      - kea-sockets:/run/kea
    depends_on:
      - kea

volumes:
  pgdata:
  bind-config:
  kea-config:
  kea-sockets:
  tls-config:
