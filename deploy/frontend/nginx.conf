# M-Eyes web frontend + API proxy with HTTPS termination.
#
# TLS material is managed from the UI (System -> HTTPS) and published by the API
# to the shared /shared/tls volume. A sidecar watcher (entrypoint.sh) reloads
# nginx whenever the certificate or these snippets change.

# Plain HTTP: redirect to HTTPS when enabled (http-redirect.conf), otherwise
# fall through and serve the app over HTTP as well.
server {
    listen 80 default_server;
    server_name _;

    # Security headers applied to every response in this server block.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    # Allow ACME / health checks and the redirect toggle to short-circuit here.
    include /shared/tls/http-redirect.conf;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_http_version 1.1;
    }

    location ~ ^/feeds/.+\.(txt|json)$ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# HTTPS: the primary listener. Certificate and TLS options are supplied from the
# shared volume and hot-reloaded.
server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /shared/tls/server.crt;
    ssl_certificate_key /shared/tls/server.key;
    include             /shared/tls/options.conf;

    # Security headers applied to every response in this server block. HSTS is
    # managed separately via the UI and emitted into options.conf.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
        proxy_http_version 1.1;
    }

    location ~ ^/feeds/.+\.(txt|json)$ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
