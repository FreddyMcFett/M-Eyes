// M-Eyes BIND9 base configuration.
// Zone declarations are generated by M-Eyes into /etc/bind/m-eyes/zones.conf.

include "/etc/bind/named.conf.options";
include "/etc/bind/rndc.key";

controls {
    inet 0.0.0.0 port 953 allow { any; } keys { "rndc-key"; };
};

include "/etc/bind/m-eyes/zones.conf";
