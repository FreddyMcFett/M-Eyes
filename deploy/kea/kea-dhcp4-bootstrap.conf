{
  "Dhcp4": {
    "interfaces-config": { "interfaces": ["*"] },
    "control-socket": {
      "socket-type": "unix",
      "socket-name": "/run/kea/kea4-ctrl-socket"
    },
    "lease-database": { "type": "memfile", "lfc-interval": 3600 },
    "valid-lifetime": 4000,
    "subnet4": [],
    "loggers": [
      {
        "name": "kea-dhcp4",
        "output_options": [{ "output": "stdout" }],
        "severity": "INFO"
      }
    ]
  }
}
